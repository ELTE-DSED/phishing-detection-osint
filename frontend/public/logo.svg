<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Shield body -->
  <path d="M256 28 L460 120 C460 120 460 320 256 484 C52 320 52 120 52 120 Z" fill="url(#shieldGrad)" stroke="#1e40af" stroke-width="8"/>
  <!-- Inner shield highlight -->
  <path d="M256 60 L430 140 C430 140 430 310 256 454 C82 310 82 140 82 140 Z" fill="none" stroke="white" stroke-width="2" opacity="0.2"/>
  <!-- Magnifying glass circle -->
  <circle cx="240" cy="230" r="80" fill="none" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <!-- Magnifying glass handle -->
  <line x1="296" y1="290" x2="360" y2="360" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <!-- Check mark inside lens -->
  <path d="M200 230 L228 258 L280 200" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
